name: Remby CI
on: [push, pull_request]

jobs:
  test:
    runs-on: codeberg-tiny
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Run Tests
        run: |
          export PATH=$PATH:/root/.local/bin
          uv sync
          uv run pytest
